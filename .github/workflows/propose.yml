name: Proponi post

on:
  schedule:
    - cron: '0 8 * * 1,4'  # Lunedì e giovedì alle 8 UTC (9/10 ora italiana)
  workflow_dispatch:

jobs:
  propose:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Proponi post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_DA_PUBBLICARE: ${{ secrets.GOOGLE_DRIVE_FOLDER_DA_PUBBLICARE }}
          GOOGLE_DRIVE_FOLDER_ARCHIVIO: ${{ secrets.GOOGLE_DRIVE_FOLDER_ARCHIVIO }}
        run: node scripts/propose.js

      - name: Salva state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: aggiorna state.json [skip ci]"
          git push
