name: Controlla approvazioni

on:
  # ⚠️ DISABILITATO — il polling approvazioni ora lo gestisce Make.com
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Controlla approvazioni Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_DA_PUBBLICARE: ${{ secrets.GOOGLE_DRIVE_FOLDER_DA_PUBBLICARE }}
          GOOGLE_DRIVE_FOLDER_ARCHIVIO: ${{ secrets.GOOGLE_DRIVE_FOLDER_ARCHIVIO }}
        run: node scripts/check-approvals.js

      - name: Salva state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: aggiorna state.json [skip ci]"
          git push
