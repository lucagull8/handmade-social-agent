name: Agent AI — Proponi Post

on:
  schedule:
    - cron: '0 9 * * 3'   # Mercoledì alle 11:00 ora italiana (estate) / 10:00 (inverno)
    - cron: '0 8 * * 0'   # Domenica alle 10:00 ora italiana (estate) / 9:00 (inverno)
  workflow_dispatch:         # Avvio manuale da GitHub UI

jobs:
  agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Serve per committare posted_images.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze Python
        run: pip install openai requests

      - name: Esegui Agent AI
        env:
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python agent_ai.py

      - name: Salva posted_images.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_images.json
          git diff --staged --quiet || git commit -m "chore: aggiorna posted_images.json [skip ci]"
          git push
