name: Agent AI — Proponi Post

on:
  schedule:
    - cron: '0 8 * * 1,4'  # Lunedì e Giovedì alle 8:00 UTC (10:00 ora italiana estiva)
  workflow_dispatch:         # Avvio manuale da GitHub UI

jobs:
  agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze Python
        run: pip install openai requests

      - name: Esegui Agent AI
        env:
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python agent_ai.py
